<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pink-main: #ff0066;
            --pink-glow: rgba(255, 0, 102, 0.5);
            --bg-dark: #0f0a15;
            --header-bg: #2d132c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body {
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER (SCREENSHOT STYLE) --- */
        .hero-header { 
            margin: 20px; 
            padding: 50px 20px; 
            background: linear-gradient(135deg, #2d132c 0%, #190a19 100%);
            border-radius: 40px; 
            border: 1px solid rgba(255, 0, 102, 0.2); 
            position: relative; 
            overflow: hidden; 
            text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        /* --- PROFILE PICTURES FIX --- */
        .profile-container {
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px; position: relative; z-index: 10;
        }

        .p-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 4px solid var(--pink-main); 
            box-shadow: 0 0 25px var(--pink-glow); 
            object-fit: cover; aspect-ratio: 1/1; background: #000;
        }

        .user-p-img { 
            width: 90px; height: 90px; border: 4px solid #fff; 
            margin-left: -35px; object-fit: cover; aspect-ratio: 1/1;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }

        .name-style { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 5px; display: block; }
        .verified-tag { color: var(--pink-main); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* --- TOP NAV & COUNTER --- */
        .top-nav { display: flex; justify-content: flex-end; align-items: center; padding: 15px 25px; gap: 12px; }
        .eye-counter {
            background: rgba(255, 0, 102, 0.1); border: 1px solid var(--pink-main);
            color: var(--pink-main); padding: 5px 15px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px;
        }

        /* --- CARDS --- */
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .nav-card { 
            background: var(--glass); border-radius: 35px; padding: 35px 15px; text-align: center; 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); 
            position: relative; overflow: hidden; transition: 0.4s; 
        }
        .nav-card:hover { border-color: var(--pink-main); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 0, 102, 0.15); }
        .nav-card i { font-size: 2.5rem; color: var(--pink-main); margin-bottom: 12px; display: block; filter: drop-shadow(0 0 8px var(--pink-glow)); }
        .nav-card p { font-weight: 700; font-size: 16px; }

        /* --- AI SECTION --- */
        .ai-section { max-width: 500px; margin: 20px auto 50px; padding: 0 20px; }
        .chat-ui { background: rgba(0,0,0,0.5); border-radius: 35px; border: 1px solid rgba(255,0,102,0.2); padding: 25px; backdrop-filter: blur(10px); }
        #chat-log { height: 140px; overflow-y: auto; color: #ccc; font-size: 14px; margin-bottom: 15px; }
        .chat-row { display: flex; gap: 10px; }
        .chat-row input { flex: 1; background: #1a1520; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 50px; outline: none; }

        /* --- LOVE RAIN --- */
        .header-rain { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
        .heart { position: absolute; color: var(--pink-main); font-size: 12px; animation: rainMove linear forwards; opacity: 0; }
        @keyframes rainMove { 0% { transform: translateY(-20px); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translateY(350px); opacity: 0; } }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(15px); }
        .login-box { background: #16111a; padding: 50px 30px; border-radius: 50px; border: 1px solid rgba(255, 0, 102, 0.3); text-align: center; width: 90%; max-width: 400px; }
        .btn-main { background: linear-gradient(90deg, #ff0055, #ff0077); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 25px; box-shadow: 0 10px 25px rgba(255,0,102,0.4); }
    </style>
</head>

<body>
    <audio id="snd-open" src="open.mp3"></audio>

    <div id="login-screen" class="modal" style="display: flex;">
        <div class="login-box">
            <img src="ratan.jpg" class="p-img" style="margin-bottom: 25px; width: 120px; height: 120px;">
            <h2 style="margin-bottom: 8px;">Ratan Bro Portal</h2>
            <p style="color: #777; font-size: 14px;">Private VIP Cloud Ecosystem</p>
            <button class="btn-main" onclick="login()">Authenticate via Google</button>
        </div>
    </div>

    <div id="dashboard-ui" style="display: none;">
        <div class="top-nav">
            <div class="eye-counter"><i class="fas fa-eye"></i> <span id="v-count">200</span></div>
            <button onclick="logout()" style="background:none; border:1px solid #333; color:#666; padding:6px 15px; border-radius:50px; cursor:pointer; font-size: 12px;">Sign Out</button>
        </div>

        <header class="hero-header">
            <div id="rain-zone" class="header-rain"></div>
            <div class="profile-container">
                <img src="ratan.jpg" class="p-img">
                <img id="u-photo" src="" class="p-img user-p-img" onerror="this.src='ratan.jpg'">
            </div>
            <span id="u-name" class="name-style">...</span>
            <div class="verified-tag">Verified Member</div>
        </header>

        <main class="grid-layout">
            <div class="nav-card" onclick="alert('No new notifications')"><i class="fas fa-bell"></i><p>Notification</p></div>
            <a href="testpaper.html" class="nav-card"><i class="fas fa-file-pdf"></i><p>Test Papers</p></a>
            <a href="business.html" class="nav-card"><i class="fas fa-briefcase"></i><p>Business</p></a>
            <a href="portfolio.html" class="nav-card"><i class="fas fa-user-circle"></i><p>Portfolio</p></a>
        </main>

        <section class="ai-section">
            <div class="chat-ui">
                <div id="chat-log"><b>AI Assistant:</b> পোর্টালে স্বাগতম বস! কীভাবে সাহায্য করতে পারি?</div>
                <div class="chat-row">
                    <input type="text" id="ai-msg" placeholder="Ask Ratan AI...">
                    <button onclick="askAI()" class="btn-main" style="width: auto; padding: 10px 20px; margin-top: 0;">SEND</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const AI_API = "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";

        function startRain() {
            const zone = document.getElementById('rain-zone');
            setInterval(() => {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                zone.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 600);
        }

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-photo').src = user.photoURL;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
                document.getElementById('snd-open').play();
                startRain();

                // Counter Logic
                let count = localStorage.getItem('ratan_v_count') || 200;
                count = parseInt(count) + 1;
                localStorage.setItem('ratan_v_count', count);
                document.getElementById('v-count').innerText = count;

                // Sync to DB
                await setDoc(doc(db, "users", user.email.replace(/\./g, '_')), {
                    name: user.displayName,
                    lastSeen: new Date().toLocaleString()
                }, { merge: true });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard-ui').style.display = 'none';
            }
        });

        window.askAI = async () => {
            const inp = document.getElementById('ai-msg');
            const log = document.getElementById('chat-log');
            if (!inp.value) return;
            const msg = inp.value;
            log.innerHTML += `<div style="text-align:right; color:var(--pink-main); margin: 5px 0;"><b>You:</b> ${msg}</div>`;
            inp.value = "Thinking...";
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${AI_API}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: msg }] })
                });
                const data = await res.json();
                log.innerHTML += `<div style="margin: 5px 0;"><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch (e) { log.innerHTML += `<div>Error connecting...</div>`; }
            inp.value = "";
            log.scrollTop = log.scrollHeight;
        };
    </script>
</body>
</html>
