<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Ultra Premium Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========================================
           DESIGN SYSTEM & COLOR PALETTE
           ======================================== */
        :root {
            --pink-main: #ff4d94;
            --pink-dark: #cc0052;
            --pink-light: #ff80b3;
            --pink-glow: rgba(255, 77, 148, 0.7);
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========================================
           DYNAMIC LOGIN BACKGROUND ANIMATION
           ======================================== */
        .login-bg-animated {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(45deg, #020617, #1e0b26, #020617);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ========================================
           LOVE RAIN SYSTEM (EXTENDED)
           ======================================== */
        .love-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: var(--pink-main);
            filter: drop-shadow(0 0 5px var(--pink-glow));
            animation: heartRainMove linear forwards;
            opacity: 0;
        }

        @keyframes heartRainMove {
            0% { transform: translateY(-50px) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(110vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* ========================================
           LOGIN PAGE ELEMENTS
           ======================================== */
        .login-card {
            background: var(--glass);
            padding: 50px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 77, 148, 0.3);
            text-align: center;
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Rotating Border around Pic */
        .pic-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            padding: 5px;
            border-radius: 50%;
            background: linear-gradient(0deg, transparent, transparent, var(--pink-main));
            animation: rotateBorder 3s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #000;
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        /* Login Button Animation */
        .btn-login {
            background: linear-gradient(90deg, var(--pink-main), var(--pink-dark));
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 30px rgba(255, 77, 148, 0.4);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 77, 148, 0.6);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* ========================================
           MAIN DASHBOARD & COUNTER
           ======================================== */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 25px;
            gap: 15px;
        }

        .visitor-counter {
            background: rgba(255, 77, 148, 0.15);
            border: 1px solid var(--pink-main);
            color: var(--pink-main);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
        }

        .hero-section {
            margin: 20px;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            border: 1px solid rgba(255, 77, 148, 0.2);
            text-align: center;
            position: relative;
        }

        .user-name-loop {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--pink-main), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 4s linear infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* ========================================
           CARDS & AUTO-WAVE (BARI) ANIMATION
           ======================================== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 20px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .box-card {
            background: var(--glass);
            border-radius: 35px;
            padding: 35px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            /* Auto Bari Animation for Mobile */
            animation: autoPulse 4s infinite ease-in-out;
        }

        @keyframes autoPulse {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            50% { border-color: var(--pink-main); box-shadow: 0 0 20px rgba(255, 77, 148, 0.3); }
        }

        /* Shine Mask on hover/auto */
        .box-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 77, 148, 0.2), transparent);
            transition: 0.8s;
            transform: skewX(-20deg);
        }

        .box-card:hover::before {
            left: 150%;
        }

        .box-card i {
            font-size: 2.8rem;
            color: var(--pink-main);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--pink-glow));
        }

        .box-card p {
            font-weight: 700;
            font-size: 16px;
        }

        .box-card.full {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 25px;
        }

        /* ========================================
           AI CHAT STYLES
           ======================================== */
        .ai-container {
            max-width: 500px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .chat-box {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 35px;
            border: 1px solid rgba(255, 77, 148, 0.2);
            padding: 25px;
        }

        #chat-logs {
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ccc;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #333;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--pink-main);
        }

        /* Utility */
        .system-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(15px);
        }

        #v-hidden { position: fixed; opacity: 0.01; pointer-events: none; }
    </style>
</head>

<body>
    <div class="login-bg-animated"></div>
    <div id="rain-mount" class="love-container"></div>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="snd-open" src="open.mp3"></audio>

    <div id="login-overlay" class="system-modal" style="display: flex;">
        <div class="login-card">
            <div class="pic-wrap">
                <img src="ratan.jpg" class="login-img">
            </div>
            <h2 style="margin-bottom: 5px; letter-spacing: 2px;">RATAN BRO</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 30px;">ULTRA PRIVACY PORTAL</p>
            <button class="btn-login" onclick="startLogin()">LOGIN WITH GOOGLE</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="top-bar">
            <div class="visitor-counter">
                <i class="fas fa-users"></i> <span id="v-count">200</span>
            </div>
            <button onclick="logout()" style="background: none; border: 1px solid #333; color: #666; padding: 6px 15px; border-radius: 50px; cursor: pointer; font-size: 12px;">Sign Out</button>
        </div>

        <header class="hero-section">
            <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 20px;">
                <img src="ratan.jpg" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--pink-main); box-shadow: 0 0 25px var(--pink-glow);">
                <img id="user-pic-main" src="" style="width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; margin-left: -35px; background: #000;">
            </div>
            <span id="display-name" class="user-name-loop">Username</span>
            <div style="margin-top: 15px;">
                <p style="font-size: 12px; color: #555;"><i class="fas fa-shield-alt"></i> ID: <span id="user-id">Scanning...</span></p>
            </div>
        </header>

        <div class="card-grid">
            <div class="box-card" onclick="openNotif()">
                <div id="notif-dot" style="position:absolute; top:15px; right:15px; width:12px; height:12px; background:red; border-radius:50%; box-shadow:0 0 10px red; display:none;"></div>
                <i class="fas fa-envelope-open-text"></i>
                <p>Notification</p>
            </div>

            <a href="testpaper.html" class="box-card">
                <i class="fas fa-book-reader"></i>
                <p>Test Papers</p>
            </a>

            <a href="business.html" class="box-card">
                <i class="fas fa-chart-pie"></i>
                <p>Business</p>
            </a>

            <a href="portfolio.html" class="box-card">
                <i class="fas fa-user-shield"></i>
                <p>Portfolio</p>
            </a>

            <a href="https://numberlookup.pro.bd/" target="_blank" class="box-card full">
                <i class="fas fa-fingerprint"></i>
                <p>Advanced Identity Lookup</p>
            </a>
        </div>

        <div class="ai-container">
            <div class="chat-box">
                <div id="chat-logs"><b>AI:</b> পোর্টালে স্বাগতম! আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
                <div class="input-group">
                    <input type="text" id="ai-query" placeholder="Ask Ratan AI...">
                    <button onclick="askAI()" class="btn-login" style="padding: 10px 20px; width: auto;">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notif-modal" class="system-modal" style="display: none;">
        <div class="login-card" style="border-color: #fff;">
            <i class="fas fa-broadcast-tower" style="font-size: 3rem; color: var(--pink-main); margin-bottom: 20px;"></i>
            <h3 style="margin-bottom: 15px;">ADMIN MESSAGE</h3>
            <p id="notif-text" style="line-height: 1.6; color: #ccc;"></p>
            <button class="btn-login" onclick="closeNotif()" style="margin-top: 25px;">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const AI_KEY = "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";

        let currentUser = null;
        let lastMsg = null;

        // Love Rain - Extra Heavy
        function startLoveRain() {
            const wrap = document.getElementById('rain-mount');
            setInterval(() => {
                const h = document.createElement('i');
                h.className = 'fas fa-heart heart';
                h.style.left = (Math.random() * 100) + '%';
                h.style.fontSize = (Math.random() * 12 + 10) + 'px';
                h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                wrap.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 400); // 400ms frequency for extra hearts
        }

        // Visitor Counter (Simple Logic)
        function initCounter() {
            let count = localStorage.getItem('v-count') || 200;
            count = parseInt(count) + 1;
            localStorage.setItem('v-count', count);
            document.getElementById('v-count').innerText = count;
        }

        window.startLogin = () => {
            signInWithPopup(auth, provider);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('display-name').innerText = user.displayName;
                document.getElementById('user-pic-main').src = user.photoURL;
                document.getElementById('user-id').innerText = user.uid.substring(0, 10);
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('snd-open').play();
                
                initCounter();
                startLoveRain();

                // Save user meta (Optional without camera)
                const userPath = user.email.replace(/\./g, '_');
                await setDoc(doc(db, "users", userPath), {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: new Date().toLocaleString()
                }, { merge: true });

            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
            }
        });

        // AI Chat Functionality
        window.askAI = async () => {
            const input = document.getElementById('ai-query');
            const logs = document.getElementById('chat-logs');
            if (!input.value) return;

            const query = input.value;
            logs.innerHTML += `<div style="text-align:right; color:var(--pink-main); margin-top:8px;"><b>You:</b> ${query}</div>`;
            input.value = "Thinking...";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${AI_KEY}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: query }] })
                });
                const data = await response.json();
                logs.innerHTML += `<div style="margin-top:5px;"><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch (e) {
                logs.innerHTML += `<div style="color:red;">API Error!</div>`;
            }
            input.value = "";
            logs.scrollTop = logs.scrollHeight;
        };

        // Realtime Notifications
        onSnapshot(doc(db, "system", "updates"), (snapshot) => {
            if (snapshot.exists()) {
                lastMsg = snapshot.data();
                if (lastMsg.hasNew) {
                    document.getElementById('notif-dot').style.display = 'block';
                }
            }
        });

        window.openNotif = () => {
            if (lastMsg) {
                document.getElementById('notif-text').innerText = lastMsg.message;
                document.getElementById('notif-modal').style.display = 'flex';
                document.getElementById('notif-dot').style.display = 'none';
                document.getElementById('snd-click').play();
            }
        };

        window.closeNotif = () => document.getElementById('notif-modal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
